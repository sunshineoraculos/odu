<h1>Descubra seu ODU</h1>

<input type="date" id="data">

<br>

<button onclick="calcular()">Descobrir</button>

function calcular(){
  let data = document.getElementById("data").value;

  if(!data){
    alert("Digite sua data de nascimento");
    return;
  }

  let numeros = data.replace(/-/g,"");
  let soma = 0;

  for(let i=0; i<numeros.length; i++){
    soma += parseInt(numeros[i]);
  }

  while(soma > 16){
    soma = soma.toString().split('').reduce((a,b)=> parseInt(a) + parseInt(b), 0);
  }

  if(soma === 0){
    soma = 16;
